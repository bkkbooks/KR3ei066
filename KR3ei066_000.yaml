front:
  text: 序事有創於聖沒千歲之後起於絶海萬里之隅而出於尋常度量之外別設尺寸奇偉譎怪先王不道古籍無載而不可非者焉蓋事物之變日新無窮而所以待之者亦何有定方夫如是而後天地之理無闕也然是其人必其生稟陰陽之異氣倜儻誠愨又必多歷事變致思專一竭終身之知巧而後可與於此也而又輔翼而贊述之者得其人而後可有立後世而不墜也非浮淺輕儇靳名疚利之徒所能庶幾於朝夕也苟能有於斯則雖飲食器械之微其於生養之方豈曰小補而止哉況醫藥生靈夭壽所關誠能有所發於古而可傳於後則一砭半匕之術生民之受貺蓋有不可量者焉夫醫意也人身其大許幾四肢百骸彼之所有即此之所具執柯以伐柯其則不遠苟能用意精切驗己而推人其有不得其道者哉故夷蠻之人目未嘗知中國之書而能自別設術立方而多簡徑可喜取效奇中者豈非以精意專一而然乎謂漢唐諸家之外別無他道則隘矣賀川翁子玄其人忠信專愨其少倜儻好奇節而任俠既治方伎窮精砭針按摩之術一日以意救脫鄰人婦之蓐厄忽然有所悟因推而試之數人皆如其意積以歲月益精確自信乃立一家之言著産論一篇學無所師承又不本古人故其所持論初聞若可驚然皆其所親歷而獨得故簡徑奇中凡産蓐之病其變無方而皆不能逃其尺寸豈所謂稟異氣而歷事變能用其意者耶子啓本岡本氏之子也翁見其修業精苦舉其術與産不授其子而授子啓令以疇其學而子啓乃取翁之書所未備與己之新得者作論並圖翼之而後翁之學無復余蘊而可不墜於後云余於方伎之書一無所解故二子之書得失合否固不得而知也但以翁之為人而信其言之不欺以其術之有驗而知其方之不戾矣而以子啓能當翁之選又能羽翼其書而無惑於其為人與學矣抑余又有所懼焉諺曰烏學鸕鷀必死於水懼輕儇之徒視翁之舉悅其名而效之一廢古人成説妄意肆臆以禍生靈也又懼其徒鹵莽滅裂不盡翁之學而禍翁之道也夫必忠信專愨不勸沮於譭譽不就避於利害如翁而後翁可能也必篤信勤苦如子啓而後翁之道可學也其精微之術書所不能盡者學者何不及翁與子啓之在來而面受之哉安永乙未孟夏柴邦彥撰
