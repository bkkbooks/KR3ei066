body:
  text: 凡例一吾門之治妊娠也救護之術什居八九此編亦惟專以明治術為要其術不一一病一術者有之或二術三術者有之法隨症以施其揆一也以備胎前産後之急患下此則雖有諸症亦易與耳一産論方術時有略舉而未備者蓋識者聞一知什而昧者瞪若焉先生此舉本不過欲以擴充遺蘊所以名編曰翼也然而僕輩竊謂比之延津劍合江浦珠雙矣故此編治術湯藥凡在彼者此不復贅一回生鉤胞之二術術意神奧非其人不能用又非筆墨所能盡以故産論只舉其目而已雖然未識此術何以得使當生者起焉初先生之為此編也本欲亦列二術之概略既又以雖得其門而入者猶且難入室何矧私淑紙上之言非唯無益恐卻害人遂止有志之士盍歸來親受面誨以造其微焉一産椅鎮帶之害孕滔滔者天下皆是吾門日夜所務辭闢也而産論有説殆韶美不復添蛇足一胎之死生攻補攸分治産之一大準的不可不講此編詳明其候法及嬰兒保護試乳浴法和盤托出無有靳祕亦誨人不倦之一端也一順逆懷孕孿生橫礙之諸狀産論及此編反覆已盡之然尚恐昧者難達也別圖於編末以備參考門人泉界茂庵佐佐井玄敬謹記按腹此婦人孕三四月際善用此乃必得其腹內鬱氣大散脈絡調理而惡阻之患亦得速除矣其餘不問老幼男女諸病兼用之其益不少且此為産科所用諸手法之本源諸手法皆由此而生故凡欲通産科之諸術者此不可不最先練習熟慣也其用手之法凡七凡欲施此術者先令其婦人仰臥醫須就其左邊以左膝頭抵承其髀樞少帶推壓之意以令不得移動然後先用兩手於婦胸腹左手覆安心下右手掌當婦胸間以候其虛里之動消息須臾始入按腹之術其初第一手法先以左手掌安心下右手分排指頭從膺上至心下左右拊循其肋骨之間漸下至心下左手視右手之拊循下亦逐勢漸次下迄臍下而安住焉次第二手法左手仍安臍下而用右手食中無名指頭從鳩尾沿季肋向右脅下章門強按下之又用右手大指頭從鳩尾向左章門強按下之左右各三遍作之次第三手法左手仍安前處而用右手大次指從鳩尾分夾任脈迄臍下強按下之三遍次第四手法醫先聳腰將左手以其指頭用力覆拘婦人右章門邊右手食中無名三指頭用力沿右季肋推進向其右不容穴而強按之左手卻逐其勢拘勒腹皮而舉提之又將左手仰抅其左章門邊右手大指頭用力沿左季肋推進向其左不容穴而強按之左手如前逐其勢抅勒腹皮向外而舉提之各三遍次第五手法兩手中食指頭斜相向婦人右小腹上而其八指頭皆用力按住而抅拽向內復用兩大指相向從左小腹上起指頭用力按住推送向外作之三遍勢若搖櫓之狀次第六手法醫臨豎左膝聳身將兩手從婦人兩脅向其背後以其兩指頭分夾其脊骨第十二三椎按抑之使指骨節間有聲而下至十六七椎邊兩手如擁抱狀而舉提之至章門邊兩手用力束勒向腹前相聚作之三遍是時醫宜面婦人下部而坐而當其舉提之時捩腰以頭反顧卻面婦人上部次第七手法用兩手食中無名指頭用力當任脈左右幽門穴迭換徐徐按之沿季肋而下至不容至章門漸慚按下已上凡七法其用手須著實為之不可倉卒為之倉卒則無功矣凡第四第五等用手法切不可倉卒使腹皮牽急先須每於指下微蹙其腹皮以使有餘裕然後復徐取引之前乃得其無牽急之患辨胎方書中診婦人妊否多載脈例然其言率茫洋如捕風捉影夫古人非鬼非神鑑幽洞微惡能至斯要不過妄誕附會以奇其事耳候胎之法産論已詳之而近新有得一二舉之以便蒙生令婦人仰臥先用産論按腹法更撫摩其兩腳上從股際下向腳尖熟撫數遍而後候之乃得其胎浮出全應焉又視其眼中眼中多白多妊又妊娠四五月任脈上多露紫筋又捫其乳房底有若覆小盞者多妊産論謂任脈窪成一道者為孿胎之候然此惟五六月間見之至八九月一道者即隱不見但腹容左右大張狀有稜角而腹面卻平是為孿候又有兒胎天然兩折如弓橫在母腹中者診其腹左右有物各自運動其候大類孿胎切勿誤認有未産而乳汁出者婦人血氣盛者多有此症方書或名之乳泣而云生子不育者大不然吾數見有此症者分娩後其子皆安健無事方書之不可信此類甚多矣整胎此術蓋理兒胎居偏或胎將墜經若水下或婦人不時顛仆或致胎動或右足彎急難步行者凡此類皆用整胎術而凡妊娠五六月後時時用此整理其胎乃得兒胎常正而分娩亦容易産論所舉術甚詳矣而今又新有所得法已簡易而得效亦速故重此舉示須兼施之而可也其法令婦人仰臥醫坐其左邊先為按腹第六手法數遍使胎上浮當得兒頭偏於右邊小腹者則疊聚兩手指頭以整之而此時若見有燥屎者須如産論所言撥之而徐與其婦呼吸相適拘拽至任脈位用左手按住卻用右手掌按兒臀尻在婦左章門邊者而上之務令其欹斜胎得中正胎既正至任脈位時又須側兩手抅其兒頭上之是時醫坐法亦須斜面婦腳而坐其上之亦須注一體之力於其指頭振腰以為之然後更為按腹第六手法數遍如是則橫骨際得疏通無小便不利之患矣救癇治術病候俱詳於産論但此症多有燥屎者而妊娠七八月已後多發之間亦有五六月發者然甚罕而其救之不早則難得功其症皆按其胸下有物奔上醫須及其未衝心前救之若其已衝心口鼻出物如糞汁藥不得下咽皆自鼻流出者十八九為難治若口噤難得用藥者須用拳頭強按右不容穴如産論法當得其口自開又有一種吐舌者必死不可救又有平日多妒夫妻反目怒火熾盛因發此病者凡此症十八九其胎墮又有發癇中子宮自開兒頭已臨探之應手者須用回生術及早出之不則其癇症收復亦必遲矣又有癇後繼成狂症者又有癇後郁胃四五日不醒省者治方參連湯第二和劑湯第五和劑湯一味熊膽已上諸方俱有經驗須選用之如其因致小産者若用回生術後皆宜折衝飲後用第三和劑類調理之參連湯方人參一錢用本邦所産稱直根者黃連五分上二味水一合半煮取一合頓服第二和劑湯方黃連四分黃芩大黃各五分上以水一合煎之二三沸去滓加辰砂五分攪用第五和劑湯方茯苓半夏各一錢五分白朮一錢青皮直根人參各五分枳實四分生薑五分上七味水二合煎取一合二勺分服折衝飲方見産論第三和劑湯方同上探宮此為臨産候胎之法凡産之難易胎之死生順逆橫偏及娩時之遲速等專藉有此術以得預審吉凶者也産論此術附見坐草條下今為初學別作一術以詳辨之醫先以頭入婦左腋下令婦以左手靠其肩上醫右手裹綿衣入婦股間其腕骨承婦肛門坐之而左手向婦腰腹胞持之每陳疼至以右手承肛門者昂按迎起之陳疼一二至後去所裹綿衣逐掣開手勢以其中指從陰門下邊入探之必從下邊者蓋其上邊因其力息陰肉脹出不容入指也如其水漿尚在膜中飽滿者待其張時爪破之具見産論其辨是膜是兒頭之法摸之其物柔軟若絹包水按之成凹者是膜也如兒頭硬且有發須兩指頭撮以驗之凡子宮開口周寸許而得兒頭應指頭者此為娩期未至之候及徑二寸許乃是將娩之候醫須以其指頭圜轉其兒頭項上兒頭乃得作勢其生必速矣大抵探宮陰中多濕潤者而極乾燥者亦有之勿妄謂死胎此是陽氣至盛者耳又有子宮口尚向後肛門探之不得者此産論所謂橫冒子宮者此産往屬難理近得一法須令側臥從陰戶下邊深入指拽正其口使向前而可也又有口向上者須如前法拽正其口使向下切莫妄謂子宮無口也導水臨産之歸有小便不通者是以兒頭閉塞於陰戶而然也若不通經時則因以致成腹滿危急之症須令婦人仰臥醫以右手大指入陰中推兒頭使下向肛門陰中因此得稍松蓄水隨即得溢出腹滿立減氣息頓平矣又一法須令婦人少開股而立醫以右手食中二指入陰中強勾兒頭引之使下向肛門此用前術兒頭不移者乃可施此以救之術意雖同得功尤速雖然若難産疲勞艱於起居者後術所難施宜專意依前術必得其效又有兒頭偏傾右邊不通者須令婦人左側臥醫以食中二指推兒頭下向左方得頭稍向中蓄水必隨泄下又此不通症有力息俄止不來者不可謂胎死也以小便閉腹中滿致氣逆不升降故譬猶飽食飽飲後則氣難下張者爾得小水通泄力息必復再來也又其小便通有繼見血下者此蓄汙不足懼也若有如赤豆汁黃汁者下而臭氣甚乃是死胎須用心察之有胎已死夾於戶陰經日不免腹因脹如鼓逆上發嘔吐者此為甚危急之症須先用前術取小便通然後依回生術救之救後或有水飲大通若暴瀉者如虛乏之婦脈成微細不能飲食者須用綿衣罨住陰門以令徐徐通之胞衣亦不可急取若使胞尿瘀血一時俱下恐致陽脫而死須暫時消息藥食兼進候脈息稍復然後下其胞衣焉坐草産論所載有術二條今新又有得三法書以示初學新術三法第一娩候已至醫豎左膝坐於婦前以頸入婦左腋下而左肩承婦之胸膛令婦兩手緊持醫帶而醫覆左手抵婦右小腹右手從其股間入昂按肛門其次第二別令人就婦背後以兩手從婦兩腋下入向腹前擁之而其指頭向下其掌貼撫其任脈之左右微帶下推之意而每陳疼至輒上提之次第三懸繩於屋梁令婦人兩手攀之及兒頭既出産戶醫以兩手承持之向陰門上邊拔取之置於傍而後使婦安坐以息之置兒於傍之時須加意防之莫使飲惡露又兒落地後發聲不速者或有臍帶左繞其頸一二匝者故切又不可向前引之恐以絞其咽忽致危殞宜急為弛去其臍帶也又初産之婦分娩之時有或兒頭蒙物如薄絹者而出此是陰戶內皮蓋初産之婦內戶肉軟皮脆兒頭逼蹙冒之以出者耳若不知者欲並拔去之産後必致大痛醫宜以兩手大指與次指托兒頭之上下推之向陰中使其自脫然後令分娩已上三法並皆佐尋常壯實産婦坐草之術如臨産經時體已疲者若體患水腫不能坐草者又須卷蓐其頭漸高而令側臥醫坐婦前從股間入手以昂按其肛門而左手扶婦肩或使人扶之亦可也或令婦高枕側臥醫坐其背後以昂按其肛門亦可也又一法娩期已至漿已破迸胎猶在上不得娩經時者救之之術醫踞尺余小几與婦相面兩手指頭向上以其掌按不容穴左右令婦兩手緊持醫頸舉體懸任醫左右膝頭著婦小腹醫仍生腰反背每陳疼至作之其胎乃自然得下向人門又有死胎處深探之不得者先用此術後依回生術救其他臨産經日嘔逆胎因致上逼心下者亦同前如産前患水腫陰門腫滿跪坐不能兩股相湊衣被觸之亦作痛苦者其分娩時兒頭臨出必不堪大痛若不早理致艱害而此症非藥物之所能理須三稜針用麻絲扎露鋒可一分刺陰門分肉處四周無算仍以綿衣罨覆其上輕手挹去其畜水刺口水出其腫立消其産甚易又有非水腫而産前後陰門大腫痛其色赤者切不可針若誤針則血出大痛但須用龍翔飲如上云水腫者其色白針之不覺其痛龍翔飲方見産論近閲清人所著達生編其理孕護胎用布約纏兩道橫束腰間此推其旨正與本邦用鎮帶者同則其害孕非淺鮮也至云臨産但上床安睡切忌用力因取譬哺雞自能啄殼自出是為時候未到妄用力者言之其理則稍似可聞但其已失之於平時者豈唯時候未到妄用力者而已哉恨無人航海為彼民一告此者耳斷臍凡斷臍帶有二要附臍者宜短且去血附胞者宜長且不去血附臍者長宜四五寸須用手指扼之使其帶中黑血不得滯著而留四五寸用麻線扎之距扎寸許復一扎扎訖後竹刀截去其兩扎中間所以必短者俗多以中人之臂腕至肘相距間為度截之者誤也蓋帶長則其干必遲以此蟠屈著兒腹上兒往往因致感寒腹痛當深戒所以去血者以血去則易早干故也附胞帶所以必扎之者以備若胞衣難下之時攀曳易為力若不預扎帶中血盡則忽皺縮成細小不便把持也故如健婦雖不用扎而可也又遇胞衣難下者亟須先斷臍帶使其兒先就浴為良禁暈病候詳見産論而其治術余別又有所得就婦人左邊而立右手搭其背左手按住其腹上衝之物推送之於委食本位暈止甚速然其手稍緩輒復發矣故若任産婦在椅中乃永無平定之期須不放左手仍扶出椅就蓐右側臥過一二時則得平定平定後左右臥從其便而可也上所言乃治産論所云血氣上起與食谷相搏其頭必仰者之暈之術也又因瘀血衝心而暈者術須先禁暈醫以左手大次指緊按左右不容穴則知知則如法右側臥灌折衝飲抽刀散類又因脫血而暈者或即死或二三暈即死尤為難治先須遏血術詳遏崩條然後依左手按不容之術而後右側臥治方第一和劑湯或第四和劑湯折衝飲方見産論抽刀散方用五靈脂一味為末每服一錢白湯調下日二三服第一和劑湯方見産論第四和劑湯方同上抒倒産論説此三術甚詳今新有三術為初學記之凡用抒倒之術手須輕捷稍遲兒則死若兒死足腹皆出而兩臂礙住不得出者須令婦人左側臥從陰門下邊入左中指當探得兒左肩膊是時須以其指頭循其膊而漸移索其臂灣臂灣既得則以指頭抅而引之其臂乃得屈折而出又令右側臥以右手探兒右臂出之如前兩臂已出後若兒頭仍拒橫骨不出者醫當須以綿衣裹兒體兩手捉持之向裡面一送就勢即拔乃出若猶不得出者令婦以尻端踞尺余小几上醫坐其前綿衣裹兒兩手緊捉聳腰兩肘後專用力以引拔之猶不出者令婦頭漸高仰臥醫左手緊曳兒體而右手中指從陰門下邊入以探應得其兒口頷指頭就以入口中稍緩左手而右手引一引得兒頭下俯乃出其左手始緊曳者以兒稍高則不可得其口頷故也用此術者靡不得免者矣又有頭礙橫骨難出産婆誤強引致首體分裂而拒留腹中指探之搖滑難取者須令産婦匍匐別使一人手捫其腹緊緊按住推下向小腹不容放手爾後依回生術出之凡逆生者其胞衣多連兒並出以胞元蓋在兒膏肓上故也整橫兒手指若肘先露者名曰橫産術見産論然露已及膊者不可復順正宜依回生術以救之又橫産有探得其背者須令婦高枕開股仰臥醫用左手指頭推轉上送之得其腰曲彎之處即用左指頭從兒股間入抅其髀曳之其腳乃出若不出者依回生術救之閲達生編有治倒生橫生法曰急令安睡托入手足再睡一夜自然生其言果是邪今夫平人一有動心不能著睡矧産難之露手足者雖以千萬慰諭無安睡之理何況再睡且如倒生非卒然之變動自胚胎而然以此吾門得妊娠八九月一按腹便知之也彼乃又言是時候未至妄自用力之故大可笑雖然醫書多妄誕不止一達生編也噫拔坐救坐産術産論附抒倒條下而其説名狀未詳亦不言用手之法故此明之凡探宮得子臀尻若後陰若前陰者名坐産而此産余嘗救數十人未見兒盤膝坐者獨其體成兩折頭腳相會腳尖倒朝母乳前者甚多因思古人有坐産之名唯以得其臀尻命之者耳救之之術須醫坐婦前而令婦左側臥伸其腳翹其右腳於醫肩上使一人扶持其腳醫豎左膝而坐進身入婦股間而以右手中指入陰中漸擠其胎之臀尻使轉向上以索其腳是時當使婦勿力息力息則使其兒背愈下腳愈上故也既胎稍得偏移左兒左腳可探陰中亦乃得寬鬆有餘地便可手法施展是時須用心候其胎之死活活胎先須以中指探之挑出兒左腳後令婦右側臥探出兒右腳如前法兩腳出後高枕仰臥開股豎兩膝兒腳裹綿衣引拔之如抒倒術然坐産見活胎者千百中僅一二耳若死胎依回生術救之舉孿治術詳見産論而今有緒言一二附列於左凡遇孿胎分娩之時須視其胎差有競意者先出之若夫順産駢首向下者不必令婦仰臥惟用坐草術扶之而可也一胎已娩後推其後胎向腹中央用按腹第六術數遍後待婦力息復至然後使娩之力息未至切莫強欲出之若死胎須用回生術若雙逆産見兩兒臂尻者産論不言其術此尤為至難之産若依疑不決必致子母雙斃須令婦仰臥視其胎差有競意者隨其方上之斜側臥醫從其小腹推其胎使向下然後依回生術救之一胎已出後推其後胎向腹中央待力息至然後使娩雖才得一足須急以綿衣裹引拔之又有一兒手一兒足齊露者須托其手使入內而持其足急引拔之又順産有一時探之得兒頭與肩並出者狀大與雙胎相類宜審辨別切勿誤認有圖見下凡雙胎一順一逆者其先娩者其兒體必小以其受胎在後故其所處亦近所以先娩如後娩者必大以其受胎在前故其所處亦還故後娩多滿月之胎先娩多未滿之胎凡孿胎胞衣其大倍尋常須要及子宮未斂口前早出之稍遲取之甚難不可不知也但其出之須候血氣稍定後出之不則恐因致脫血之患易蓐難産已救後産母甚疲其衣衾穢汙而難換易者今為之設易蓐之法其法令婦人仰臥醫跨婦腹上而背立令婦兩手攀援醫背後帶上以身附之醫俯以兩手左右抱持婦兩股舉之使一人佐舉其頭而舉之用此法搬行婦乃不致搖動可以左右隨便移易其蓐極妙其設蓐高枕等法産論已詳之遏崩凡卒暴大血脫下名之曰崩崩之因有數種有分娩後産婆欲下胞強按腹動血因致之者有分身後即緊束鎮帶仍起步就椅因致之者又有發嘔吐輒血大出者又胞未至而崩仍發暈者尤為極惡候又有因産後房勞而崩者又有平日經行不順二三月閉後忽崩且發暈者而前數症又有兼寒栗者寒栗是為屬血熱又有五十上下婦人經水欲斷忽致崩者凡救崩須急赴之如産論所述而産論言其術唯舉梗概不致詳細今因詳明之左方醫急右足跨其臥婦腳上而屈左膝斜抱婦右腰著左膝上使伸兩腳其左腿灣自著其右膝臏前抱之之法亦須以其左手從婦右肩上進向左腑下抱持之以右手提婦左腿仍張小腹仍戾身微左顧乃得婦陰戶緊閉暴下即止又是時宜婦頭低若暈者醫右手按其不容而可也有鎮帶者急解去灌藥脈微細者宜第四和劑湯類輕症者宜四物膠艾湯按腹則痛腹中有塊有力息血熱甚者宜折衝飲大便祕脈數心下痞硬面赤逆上者第六和劑湯龍騰飲調理大補湯又遏崩一法令婦人側臥醫就背後而坐以一手按婦臀肉一手持婦側臥在下之足提上之亦可經閉俄崩下者往往後多繼致懷孕此是以瘀血盡中氣清和故也又有脫下後血虛者手足覺湯水滲入者尤須加調養第六和劑湯方黃連黃芩山梔子大黃黃柏各五分甘草一分上六味以水二合煮取一合三勺溫服折衝飲方見産論龍騰飲方同上大補湯方同上第四和劑湯方同上四物膠艾湯方同上泄閉此救世呼轉胞者之術而是症難産婦尤多患此者余嘗數救此症診其腹率皆其左小腹水道穴邊脹起甚則通腹脹悶如鼓因知此本非真胞系了戾者特以其小便不利強起其名者也凡患此者有二種其一臨産兒未出産婆強按其腹腹內子宮與兒胎相摩軋子宮因致傷腫起脹墜以閉塞尿道而然其一子宮追下梗於便道此二症其因雖異其候則同救之之術凡有四其一按腹第六術為之數遍若不通者令婦仰臥醫就其右脅邊坐疊聚兩手指頭而按其左水道穴上抅拽向前子宮因此抅拽起畜水乃出若猶不通者醫就婦前跪坐尺許小几先伸進兩臂指頭下向以掌按婦左右水道穴邊脹起之處此兩手用力意各不同右以推託為主左以抵拒為主而用其力又須更以其右膝頭當右肘後骨佐以撑之左膝頭當左肘後骨佐以支拒之是時又須令婦以兩手挂醫頸以其身懸任之醫仍微反已身而以左顧亦其子宮得抅起而畜水乃出若猶不治者令婦仰臥醫跨其婦當其膝上面婦立仍俯以兩手掌側骨承其水道穴脹起處用力推託上其左右手意略與前同而此法尤妙畜水隨手而出又有腹滿每搖動聞水聲狀若欲暴瀉而水卻不通者若不導之水而腹卒暴覺痛必死此蓋分娩後子宮未收塞在陰中以閉尿道故致然也此時醫須以右手分大指次指當橫骨上際承其腹而以其掌側骨隔腹皮按其子宮徐徐推之令上收乃得畜水隨手通泄可以免危斃矣治方玄英湯危急者錫圭丸玄英湯方見産論錫圭丸方大戟甘遂蕎麥各一錢大黃八分巴豆七分上五味為末粳米糊丸粟子大每服五六十丸白湯送下納腸凡腸出者臨産時候未到強令努力因致腸脫出者也若不早收乃乾澀難入以成終年之患甚多納之之法綿衣漬溫湯若煎蔥汁頻頻換之以蒸溫其腸又以海羅汁若燈油之類塗潤之然後令婦豎兩膝蹲坐醫就其右邊徐取其腸所脫出者先自上邊肉際者起以指襞疊以漸托入之其餘在外者束之作一處仰右手捱傍陰門以載之五指皆內向以束持之令婦右手搭醫左肩別使人卷蓐以帶扎之以此蓐承婦腰眼邊而又手托承婦頭醫以左手抵承婦背後令婦身委任而臥則當背反腹脹是時以右手所載腸齊時托送即得斂去斂後欲小便須以綿衣罨陰門上徐徐使通不然恐復脫出治方第一和劑湯類可也此本産論斂宮之術而彼以左膝髀抵腰後以承婦身臥其術非有臂力者頗難施用今因以卷蓐代之第一和劑湯方見産論斂宮一名收宮此亦産時強努力致子宮出娩後未能斂者斂之之術與上納腸之術同但腸與子宮恐難辨認今因詳之腸大而無口其色灰白如子宮乃其形圓如曲腰匏有口向下其色赤而有灰白色橫文以此辨之可也又娩後有胞衣下後被膜尚遺陰戶夾之外見其端者須試展之得展開乃是被膜之餘遺也當引拔之又難産後有遂患小便自利者凡難産婦人後必多患此症蓋以其分娩冒兒頭久夾不出其子宮後遂習大開而不能斂口因致尿道不爽利其小便不覺自出而然若遇患此者當教之令其夜臥常自伸其兩腳三四十日後其子宮自得斂口而此患乃除若在産椅臥不伸腳者必成終身之患矣不可不以叮嚀告戒也此症若因又致腹脹者依泄閉術救之術見前復肛令婦人側臥著枕於耳垂下溫湯蔥汁之類蒸溫其脫肛海羅燈油之類塗潤之襞疊聚束右手載之令婦身極反就勢推送意一如納腸法即得收口復後須要令大便不結大便結必復脫出治方龍騰飲朱明丸類二方見産論救痙此小産後角弓反脹者救之之術凡遇此症須急走就其右邊而立以左膝抵婦背後右足之跗當婦右膝前俯身左手托婦左肩以右手大次二指強按婦不容穴醫仍自退其右腳以其腳指與膝頭著地後踵承右臀下而屈折坐是時就其坐勢齊時兩手仍前勢以引婦身使與己身相貼依而欹臥之急別使人引伸其兩腳以此術折其反張之勢再不復發但醫抵其背後之腳要猶著其背後不相離暫時焉通計二十術死胎候法凡胎死生之候是産科施術緩急險易之所由分者不明之其誤人必多矣不可不預知也故今緝録産論中所有候法散出諸處者尚附所新得一二以為初學開列於下孕婦患水腫或有不能及臨月八九月俄免者多死胎其能至彌月者此稟賦堅強幸免其死者然千百中有一二而已凡妊娠八九月因食傷而娩者多死胎凡因食傷而娩者雖臨月之胎其所出娩兒能育者甚少凡臨産不娩經四五日忽乳汁出必是死胎凡産婦嘔吐不止氣上衝心者死胎凡陰中出黃汁如赤豆汁者為死胎凡發子癇者多死胎少活胎凡妊中顛仆而娩者多死胎亦多橫生凡腰間忽覺若負任者死胎凡五六月腰八髎穴邊作陳疼臍下又痛者必小産凡七八月患熱痢因勢力而免者多死胎如滿月者不必然凡患疫兒死腹中者必陰戶下血凡臨産其痛俄止力息不來者多死胎凡患淋疾若瘧疾者多胎墜凡臨産下水不止探之兒頭不瞤動者死胎凡臨産小便利者是子頭不在橫骨中故非橫逆生則其子既死腹中也雖然死胎又有不必小便利者須臨時審候以決知之凡初産其痛止在腹而不下腰及肛門者非橫逆生則其子已死腹中也凡臨産努力産母聲息細微每仰者死胎凡破漿後兒已出子宮二寸許而不免經時者其胎必死若尚冒膜水漿未迸者不必然凡子未娩其胞衣先下者必死胎且多橫逆生凡兒腰已下甚大者死胎其大有至如巨柱者名曰壯尻胎凡兒斜冒子宮出於橫骨下者死胎凡破漿後猶下水不止者多死胎凡雙胎先出而胎小者不育後出而胎大者育凡有腫氣者自臨産前二三日水下不絶而不覺胎撑腹腹又不痛者多死胎凡坐産露臀尻者多死胎其活胎者千百中一二而已嬰兒保護凡赤子已生斷臍帶後須用五倍子粉糝之以紙全裹之屈曲安臍上別用絹帶自其背纏束之兒體上附臍處切莫令牽急恐致兒臍因之突出終身不復兒若頻啼須視臍帶大抵六七日乃褪落有經二七朝不褪者又褪後俗多灸其臍者大不可也恐小兒不堪火攻之若因發天吊撮口等病世亦初生多飲硃砂蜜若甘連湯吾門所用甘連加紅花大黃或鷓鶘菜湯若發鵝口瘡紫圓一粒間日用之不知者用二三粒以知為度始乳以母乳出為候始乳之可也是其稟生本資之自然禽獸皆然人何以異世乃有不待母乳出便雇乳婦者殊不知乳早則胎毒致難下也雖然如其未滿月而娩若稟賦薄弱者早乳調養亦可也其浴初生手須輕捷切不可久浴世多有因發臍風等病宜深戒之又用其所褪落臍帶燒之存性與兒飲之以下胎毒其兒發痘疹甚少驗之屢效又已娩未發聲前肌溫者不逾三日而死又肌黃色者死又生兒七朝內有頭肉腫起如瘤其色與平肌肉不異者此蓋娩時頭為陰戶所夾瘀血聚結所致須用三稜針略破其出血色如煤其腫立消以上嬰兒保護之術所當預諳者矣試乳凡試乳之法先須注之於黑漆器上以視其色淡者為上濃者為下淡蓋血液所化居多濃乃穀味所化居多濃者其來不久而易止且以飲初生小兒性重滯必傷其胃不可不察其乳房捫之堅實若覆碗者為上垂下者為下凡乳來之長短常與經水相為表裡其兒已死者其乳易止而經來必早乳出久者其經或三四年不來古人云在上為乳在下為經者其言似不誣凡産後初出乳汁者勿與飲此蓋數日房中畜積之汁飲之必有害須要數回絞去之後始飲之為可凡乳婦其氣血不和順則其乳不出若其忿怒若勞心傷氣者必忽止又富貴之家買乳婦入門一二月往往忽止者人多謂之詐騙殊有不然者蓋其乳婦多卑賤平日家居時放縱恣性驟入貴第法度森嚴身不得自由氣因致鬱滯是以其乳頓歇不出耳此等事醫亦不可不略通其故者故此並論之浴法浴産前後皆吾門所大禁無輕視妊娠中屢浴者必多患水腫或病淋疾故妊婦九月已後宜禁浴嘗見因浴致胎動上逼心下卒就危殞者往往有之是故雖乃暑天亦切不可每日浴但午前後輕輕浴之為妙如産後無他症者經二三日後欲浴者須以巾漬熱湯絞拭去其汙痕如稍重者若難産後者此拭亦禁如平穩之婦過二七朝後看其脈症平和始許輕浴為可而其浴又切不可用浴盆而須用浴桶多設其湯輕浴之餘數見平穩産婦早浴忽發熱氣息短促遂致危斃者甚多不可不懼也懷孕圖明和壬辰之春子啓先生再蒙藩召來在江戶邸滿城士庶家迎敦如織門下諸子無間受諄而請益不已先生誨僕等作諸産形狀圖畀之諸子以補其提耳所闕其圖凡三十二其中蓋亦有産論終未及言其治術者雖然識者若據斯圖而以復求論之微旨則思過半矣孕胎奇者孿胎之外又有品胎㗊胎等蓋造化偶感出奇無窮僕輩方集此圖請問品胎師云品胎甚罕家君平生治孕婦數萬僅見一二而已故其法未詳君子於所不知則闕之可也是以此等數種例不具圖附録治驗二十八條甲午之歲克乞暇西遊受業東門橘先生同盟近藤生者曾受産術於子啓先生因又得介從事子啓先生乃今産論翼成矣二三子商克以記其治驗附之然而子啓先生之門迎請如市而無産不艱無艱不起不可勝書雖然此其於事也偶令外人窺之率又有猶甚於蜀犬吠日者焉克以忝從門牆未乃不自揆乃與二三子相議抄出其最異常可以備後案者以録卷尾云水藩玄亭原昌克謹識孿胎一條坊賣油家婦新妊至五月墮胎後二月而腹仍便便延師診曰是孕也婦曰自胎墮夫出賈於外矣師曰勿疑豫言胎已七八月但善自防護之可也既滿期而果産母子皆無恙矣此蓋孿孕而奇之又奇者品胎四條織羅匠之女因失足顛躓右腳腫大遂成痛楚醫之來者不曰痛風則曰腳氣延師診之曰是孕也且為品胎皆已死矣用藥者誤焉母亦不可救矣舉家以其處子不信及為出之衆皆吐舌其明日而死乳後發狂明和戊子師應召在藩一村婦有乳後發狂已經八年者此年復産幸師適在其夫來請之理師為作折衝飲二劑且囑曰煎成加硃砂各四分後朝其夫來謝曰未盡劑狂狀頓退今日則無所病師乃更為作劑復囑加硃砂四分如前煎夫驚曰嘻僕昨誤聞教命加至四錢耳此可謂郢書燕説矣師每語人曰積年之病非小劑之所能理也後以為談資死胎師在藩時一武棄某氏內人經閉六月以為瘀血療之一朝腰腹吊痛更發嘔噦藥食不下者五晝夜勢已危極衆醫束手因迎師診視曰是孕也而兒既死矣不速出則母亦斃家人疑阻將議諸姻族叱曰生死之分界豈緩議之時急與第四和劑為出之果死胎也時阪東生亦在坐後語人曰師之用術速於牙醫拔齒誤孕變癰鄰里有一尼經閉者纍月自以為妊以墮藥塗一草根插入牝戶竟不出後二年而發臀癰不堪痛苦因延師乃與楸葉湯其莖自潰口出癰亦尋愈溺祕不産明和辛卯師從公在武城之邸一梨園者之姊數日不産小便祕澀腹脂如鼓道中一望而去者不一矣乃介邀師診則兒項拒留於橫骨間者也曰當先導水令患者左側臥行導術捫其腹一按快利始能飲食因為出之遂得不死死胎一國侯侍醫在武城邸某姓女坐草不免者十日神脫脈絶瀕死矣會師自京來因求療師曰是死胎也為出之頭顱三折而出於是乎父子執弟子之禮陰挺一名㿗疝堀川一煆家妻三十五歲有物稿黑出於陰門二寸許大如筒不得前溲者四日立起解之則不能涓點臥則得微通衆醫不知為何物延師診視問有痛癢乎曰無乃指頭搜出之後稍白色者可三寸割之理如纏筋爾後順利復故血塊大宮街煙草行妻三十三歲經閉十一個月妄認為妊一日腹內大痛穩媼勉強坐草愁楚之聲不絶師診曰是血塊也乃今將潰所以有痛也與折衝飲下黑血塊大如拳者十八枚調理旬余而收功室女懷孕一村莊室女經閉五月衆醫誤認投破血劑無驗招師診曰是妊也父母不信從迄九月請診老夫子老夫子因問師曰汝嘗視此女邪曰然曰夫腹大九月而無應者吾恐未為娠也師曰前診得孕候請待十日而更診之乃旬余而老夫子與師復診仍無應者父母又相語曰阿子性格謹厚安得有姦將復用破血劑師堅爭以不晚過二十日外胎始應手乃引其母之手以示之曰是兒頭也是兒手也父母愕然遽具襁褓以待後半歲而娩前後計十五月而母子皆全子宮下脫郡村一農婦産後子宮脫不收者五年色黧黑甚堅而其口反向於下月信至則自其口出師為行斂術霍然復故血暈鄰里一婦駢胎舉一男一女胎衣不出嘔吐昏煩仍發血暈為行禁術次日胞下河島村一農婦既産胞未下亦發暈師為禁之更與折衝飲越三日而下皆得輕快師每語人曰胞滯發暈者雖得一救全功難收如是二婦實千百中之一二幸免鬼籙者耳死孿千本坊一婦逆産已露全身不出者纍曰因請師至其家夜已半矣診之其胎孿也皆已死蓋先是坐婆強引其所露之兒項頸挺長但有皮連如線已當師探之時如線之皮已自絶去乃先為出其全胎者既欲取其所遺之頭其頭在內轉滑不可捉定探索久之而始得其口乃抅曳出之以産難移日故脈息俱虛無力開聲先是其婦母病臥其後室其夜醜牌勢極既屬纊家族悲泣聲聞於産室婦聞其聲詰問不已繼覺其死乃又悲傷氣勢更疲急與第四和劑且慰且叱因曰死者有命悼之何及胡不自重汝今臨危不如生者之不殞其身撫喻數次婦心稍若回者俄又鐘聲連響殷殷徹耳報言失火師復慮其驚悸生變守不離側百端安貼心力俱費竟得無事後語門人曰若使世之産就椅者則其豈得救乎腸覃六條土手坊一商婦歲三十八秋間患痢醫與澀劑變成腸覃肚腹如箕坐則不見膝頭衆以為必死置之若棄有人偶延師診之肋骨歷歷如蜘蛛以腹皮脹極連引麵皮口眼歪斜悉向下先與鎮砂丸十錢且日唯食以赤小豆及麥通利漸順出入歲余而竟得存生矣量小水凡五斛八斗有餘除飲食所日用者則一斛六斗蠱脹住吉巷餅匠之女乳後在草蓐手足腫裂狀如大風師乃與鷓鶘菜湯下蟲及穢物更與四物湯加芩連而康復子宮割脫朱雀邑一農婦娩後産門下垂一物如囊躬自欲出之持刀子忍痛貫之意欲以為奉出之已而誤割不堪痛楚因迎師診曰是子宮脫也則行斂術傷口亦遂不覺有痛嗣歲復生育死胎一內人初妊當坐月一日覺腹內微痛坐婆以為臨盆醫者雷同投用催生劑或稱易産奇方珍藥紛紛亂投擠簇房中須臾霍然既間二日復痛漸緊坐婆曰莫慮是試疼也又邀前醫看之醫曰定痞痛也唯忍痛為可耳乃處理痞之劑去已而腹痛至不可堪家人以信醫及坐婆之言不復顧後逮七朝面上發黑斑於是家人輩始覺其有異同族適有知師者迎而視之婦聲音舉止尚如平日唯六脈數急師出則告家人曰是猶死尸也胎柱橫骨而母羸甚回生有術亦難以施胎若一出其斃乃不待瞬是取胎失其期之過雖扁倉亦不能救耳婦果不及娩而死産兒不啼一婦欲娩不娩者纍日招師至則既産兒不發聲全面皺縮目鼻無別婦與穩媼相議曰兒生若此縱令得長醜怪驚人為衆目所笑噬臍其及乎師曰叱去無他此特産難壓橫骨而然耳已而不經二時形已復寡婦懷孕一寡婦三十五歲經行不來者五月衆醫以為經閉理之遂下紫黑衃血者纍旬而不已家人皆以為所下未盡故也乃來托之師診曰是孕也因與膠艾湯十日而血遂止及滿月而果娩母子俱全師命門人記之死胎烏丸坊一米戶妻初娠年甫四十産難旬余綿綿漸就沉滯衆醫技窮延師診視四體疲極六脈細伏而惡臭滿室告曰胎死既久矣不亟療母亦斃療亦危家人泣曰病固危急君爺幸盡意救之則死而無恨也因為出之娩後劇大熱一身如火昏悶煩躁口渴引飲極喜熱粥六七碗時或吐沫咬牙日發五六甚則將死用鷓鶘菜湯五劑下死蛔前後十六條貼然得痊可滑胎棚橋氏內人每孕必墮藥餌針灸竟不見寸效兄弟相議托師婦泣曰妾重身者嘗七不得一正産父母以責妾生兒育三日則死而不恨告曰有一法唯恐不從也曰唯命是從師因為之棄去鎮帶與以膠艾湯且戒之夫妻別寢又禁浴時會盛夏連月天旱彼以信師言堅守其戒終無點滴濡身者師又為之日以整理其胎遂得及期而舉一女子次年復孕亦如前法復舉一女子産椅之害五條街一釀家妻年過三旬經産者凡十一最後已乳腰中強硬不能行履越三年百藥無驗師先用洞當飲加地黃藭歸杜仲牛膝其次日刺左右委中各一針隨手而忽起步矣退嘆曰甚哉産椅之害人也産後發癇六角坊絹商婦娩後八朝倏忽暈厥藥汁不下衆醫不知所理以危急延師至則見家人哭泣者且辭曰婦不幸不能及君之一診既逝矣師曰病發日且而今尚未移晷余且為視之直入出告傍人曰婦未死此曰癇一身溫和尚可救也皆曰君其毋欺乎曰救之而不理則命是何忍以不救而死乃行救術氣息少通脈亦微應乃急濃煎參連頻頻灌之夜半稍省人事次日能言逮五朝而瘥陰門潰爛師在出羽時一婦乳後患人門潰爛起步則如刺時時尿床為診且探宮陰中有物大如桃核頗類浮石應指而出爾後若一掃頓快鎮帶壓胎一門徒僧內室胞漿既下不産者七朝穩媼勉強努力身體困倦腹內猶疼不能側臥一老醫投用附子理中湯益甚先是嘗新産患腳弱受診老夫子以故招師師至未診問曰有鎮帶邪曰然曰是病之原當去之鎮帶壓胎先所下之水即脬中餘瀝也於是為以整胎術未半痛頓除更與洞當飲二三劑巾櫛如常越四十日胎被膜而娩母子並全死候堀川煙草戶妻坐月患咳嗽動作無衰師診曰死期在近娩後不越二日果然二三子問其所以曰測法云虛里動劇者乃氣急之兆也以故知之子宮下墜室坊染匠婦經閉三月偶出行遊歸後小便不通者十五朝涓滴亦無矣幾至於危延師診曰是子宮下墜梗便道也用玄英湯加竹葉投二劑師因創意以蓐墊起其腰後候背反腹脹使一人就其右兩手隔腹拽上子宮師以右手食中二指自陰中捺下其子宮口反向上者小水即潰決如泉肚腹頓宛而安泄閉用是術自此始偽孕詐身田中生妾新産延師至其家則曲屏周圍衣被黏著婦交睫而倚椅診之其腹豐充其乳寬皺而婦出聲曰妾素多病産前用藥不少乳汁恐不給育兒師笑曰如是乳房原無汁之理乃使一婢取其赤子其兒頭圜圜蓋經乳已再三尤易産者之兒也及出語曰診之無産後之證彼將紿余是必有故既詢之妾者故祗園一娼妓也生未弱冠時買為妾為作一室外居之後數年無子因更聚他已而其妾與其父母恐被廢棄乃密相謀托一蓐母買貧家之初生之子以詐身也其事果覺於家婢妾遂放逐
